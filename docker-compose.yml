version: "3.9"

services:
  db:
    image: postgres:16
    container_name: tamagotchi-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tamagotchi}
      POSTGRES_USER: ${POSTGRES_USER:-tamagotchi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tamagotchi}
    ports:
      - "5432:5432"
    volumes:
      - tamagotchi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tamagotchi} -d ${POSTGRES_DB:-tamagotchi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: tamagotchi-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: tamagotchi-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://tamagotchi:tamagotchi@db:5432/tamagotchi}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8000}
    container_name: tamagotchi-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  tamagotchi_pgdata:
